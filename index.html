<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUCKY STORE | Wholesale Price List</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding-bottom: 110px;
        }

        header {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            text-align: center;
            padding: 25px 15px;
        }

        header h1 { margin: 0; font-size: 1.8rem; text-transform: uppercase; }

        /* --- Search Bar Style --- */
        .search-container {
            position: sticky;
            top: 0;
            background: #f8f9fa;
            padding: 15px;
            z-index: 100;
            max-width: 650px;
            margin: 0 auto;
        }

        #itemSearch {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 50px;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        #itemSearch:focus {
            border-color: #e67e22;
        }

        .container {
            max-width: 650px;
            margin: 10px auto;
            padding: 0 15px;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            gap: 15px;
        }

        .item-photo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #e9ecef;
        }

        .item-info {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .item-name {
            font-weight: 700;
            font-size: 1.05rem;
            color: #2c3e50;
        }

        .item-price {
            color: #e67e22;
            font-weight: 600;
            margin-top: 5px;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f1f3f5;
            padding: 5px 10px;
            border-radius: 30px;
        }

        .qty-btn {
            background: #2c3e50;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
        }

        .qty-input {
            width: 35px;
            text-align: center;
            border: none;
            background: transparent;
            font-weight: bold;
        }

        /* Footer */
        .footer-total {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        #grand-total { font-size: 1.5rem; color: #2c3e50; font-weight: 800; }

        .whatsapp-btn {
            background-color: #25D366;
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>LUCKY STORE</h1>
    </header>

    <div class="search-container">
        <input type="text" id="itemSearch" onkeyup="searchItems()" placeholder="Search product (e.g. Tapal, Surf)...">
    </div>

    <div class="container" id="inventoryList">
        <div class="item-row" data-price="1630">
            <img src="https://via.placeholder.com/50" alt="Tapal" class="item-photo">
            <div class="item-info">
                <span class="item-name">Tapal Mixture 900grm</span>
                <span class="item-price">Rs. 1630/-</span>
            </div>
            <div class="qty-controls">
                <button class="qty-btn" onclick="updateQty(this, -1)">-</button>
                <input type="number" value="0" class="qty-input" onchange="calculateTotal()">
                <button class="qty-btn" onclick="updateQty(this, 1)">+</button>
            </div>
        </div>

        <div class="item-row" data-price="170">
            <img src="https://via.placeholder.com/50" alt="Kolson" class="item-photo">
            <div class="item-info">
                <span class="item-name">Kolson Spaghetti</span>
                <span class="item-price">Rs. 170/-</span>
            </div>
            <div class="qty-controls">
                <button class="qty-btn" onclick="updateQty(this, -1)">-</button>
                <input type="number" value="0" class="qty-input" onchange="calculateTotal()">
                <button class="qty-btn" onclick="updateQty(this, 1)">+</button>
            </div>
        </div>
    </div>

    <div class="footer-total">
        <div class="total-box">
            <div id="grand-total">Rs. 0</div>
        </div>
        <button class="whatsapp-btn" onclick="sendWhatsApp()">Order on WhatsApp</button>
    </div>

    <script>
        // --- Search Function ---
        function searchItems() {
            let input = document.getElementById('itemSearch').value.toLowerCase();
            let items = document.querySelectorAll('.item-row');

            items.forEach(item => {
                let name = item.querySelector('.item-name').innerText.toLowerCase();
                if (name.includes(input)) {
                    item.style.display = "flex";
                } else {
                    item.style.display = "none";
                }
            });
        }

        function updateQty(btn, change) {
            const input = btn.parentNode.querySelector('.qty-input');
            let currentVal = parseInt(input.value) || 0;
            let newVal = currentVal + change;
            if (newVal < 0) newVal = 0;
            input.value = newVal;
            calculateTotal();
        }

        function calculateTotal() {
            let total = 0;
            document.querySelectorAll('.item-row').forEach(item => {
                const price = parseInt(item.getAttribute('data-price'));
                const qty = parseInt(item.querySelector('.qty-input').value) || 0;
                total += (price * qty);
            });
            document.getElementById('grand-total').innerText = "Rs. " + total;
        }

        function sendWhatsApp() {
            let message = "*NEW ORDER: LUCKY STORE*\n--------------------------\n";
            let total = 0;
            let hasItems = false;
            document.querySelectorAll('.item-row').forEach(item => {
                const name = item.querySelector('.item-name').innerText;
                const qty = parseInt(item.querySelector('.qty-input').value) || 0;
                const price = parseInt(item.getAttribute('data-price'));
                if (qty > 0) {
                    message += `✅ *${name}*\nQty: ${qty} | Total: Rs. ${price * qty}\n\n`;
                    total += (price * qty);
                    hasItems = true;
                }
            });
            if (!hasItems) { alert("Select at least one item!"); return; }
            message += `--------------------------\n*GRAND TOTAL: Rs. ${total}*`;
            window.open("https://wa.me/923333367707?text=" + encodeURIComponent(message), '_blank');
        }
    </script>

</body>
</html>
